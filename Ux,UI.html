<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบสมัครเข้าชมรม</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h2>ระบบสมัครเข้าชมรม</h2>
        <div class="buttons-container">
            <button class="btn-login active" id="showLogin">Login</button>
            <button class="btn-reg" id="showRegister">Register</button>
        </div>

        <div id="loginForm" class="login-container">
            <h2>User</h2>
            <input type="text" size="50" id="User_ID" name="User_ID" required="true"/>
            <h2>Password</h2>
            <input type="password" size="50" id="userpassword" name="userpassword" required="true"/>
            <div><button class="btn-login">Login</button></div>
        </div>

        <div id="registerForm" class="register-container" style="display:none;">
            <h2>Register</h2>
            <h3>ชื่อ</h3>
            <input type="text" size="100" id="First_Name" name="first_name" required="true"/>
            <h3>นามสกุล</h3>
            <input type="text" size="100" id="Last_Name" name="last_name" required="true"/>
            <h3>เบอร์โทร</h3>
            <input type="text" size="50" id="phone_number" name="phone_number" required="true"/>
            <h3>อีเมล</h3>
            <input type="email" size="50" id="Email" name="Email" required="true"/>
            <div><button class="btn-reg">Register</button></div>
        </div>
    </div>

    <script>
        const loginBtn = document.getElementById('showLogin');
        const registerBtn = document.getElementById('showRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        loginBtn.addEventListener('click', () => {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginBtn.classList.add('active');
            registerBtn.classList.remove('active');
        });

        registerBtn.addEventListener('click', () => {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerBtn.classList.add('active');
            loginBtn.classList.remove('active');
        });

        if (!loginBtn.classList.contains('active') && !registerBtn.classList.contains('active')) {
            loginBtn.classList.add('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        }
    </script>
</body>
</html>
