<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab-active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
            font-weight: 600;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-gradient-to-r from-blue-700 to-blue-500 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../dashboard/main.html" class="flex items-center space-x-3 select-none">
                <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-users-cog text-2xl"></i></div>
                <span class="text-2xl font-bold tracking-wide">ClubHub <span
                        class="text-sm font-light opacity-80">Admin</span></span>
            </a>
            <div class="flex items-center space-x-4">
                <a href="../dashboard/main.html"
                    class="px-3 py-2 rounded-lg hover:bg-white/10 transition">หน้าผู้ใช้งาน</a>
                <div class="w-px h-6 bg-white/30"></div>
                <button class="bg-slate-900/40 px-4 py-2 rounded-lg border border-white/10">
                    <i class="fas fa-shield-alt mr-2"></i>โหมด Admin
                </button>
                <div class="w-px h-6 bg-white/30"></div>
                <a href="/api/auth/logout"
                    class="px-4 py-2 rounded-lg font-medium hover:bg-white/10 transition text-red-100 hover:text-white">
                    <i class="fas fa-sign-out-alt mr-2"></i>ออกจากระบบ
                </a>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b border-slate-200 sticky top-[72px] z-40">
        <div class="container mx-auto px-6 flex space-x-8 overflow-x-auto">
            <button onclick="switchTab('clubs')" id="btn-clubs"
                class="tab-item px-2 py-4 text-slate-500 hover:text-blue-600 transition-all flex items-center gap-2 tab-active">
                <i class="fas fa-th-large"></i> จัดการชมรม
            </button>
            <button onclick="switchTab('roles')" id="btn-roles"
                class="tab-item px-2 py-4 text-slate-500 hover:text-blue-600 transition-all flex items-center gap-2">
                <i class="fas fa-user-shield"></i> จัดการสิทธิ์
            </button>
            <button onclick="switchTab('certs')" id="btn-certs"
                class="tab-item px-2 py-4 text-slate-500 hover:text-blue-600 transition-all flex items-center gap-2">
                <i class="fas fa-certificate"></i> ออกใบเซอร์
            </button>
            <button onclick="switchTab('activities')" id="btn-activities"
                class="tab-item px-2 py-4 text-slate-500 hover:text-blue-600 transition-all flex items-center gap-2">
                <i class="fas fa-calendar-alt"></i> กิจกรรมชมรม
            </button>
        </div>
    </div>

    <main id="main-display" class="container mx-auto px-6 py-8 flex-grow fade-in">
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 text-center text-slate-400 text-sm">
        &copy; 2026 ClubHub Management System.
    </footer>

    <template id="temp-clubs">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-bold text-slate-800">จัดการชมรม</h2>
                <p class="text-slate-500">บริหารจัดการข้อมูลชมรมในระบบ</p>
            </div>
            <a href="create_club.html"
                class="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-100 flex items-center gap-2">
                <i class="fas fa-plus"></i> สร้างชมรมใหม่
            </a>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100 text-xs uppercase text-slate-500 font-bold">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">ชื่อชมรม</th>
                        <th class="px-6 py-4">ประเภท</th>
                        <th class="px-6 py-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="club-list" class="divide-y divide-slate-50">
                </tbody>
            </table>
        </div>
    </template>

    <template id="temp-roles">
        <h2 class="text-3xl font-bold mb-6">จัดการสิทธิ์ผู้ใช้งาน</h2>

        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
            <div class="p-4 border-b bg-slate-50 font-bold text-slate-600">รายชื่อผู้มีสิทธิ์จัดการ</div>
            <div id="roles-list">
            </div>
        </div>
    </template>

    <template id="temp-certs">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-800">ออกใบรับรอง (Certificate)</h2>
                <p class="text-slate-500">เลือกชมรมและสมาชิกที่ต้องการออกใบรับรองกิจกรรม</p>
            </div>
            <div class="w-full md:w-64">
                <label class="block text-sm font-medium text-slate-700 mb-1">เลือกชมรม</label>
                <select id="select-cert-club" onchange="loadMembersForCerts(this.value)"
                    class="w-full border border-slate-200 p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm">
                    <option value="">-- เลือกชมรม --</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                <span class="font-bold text-slate-600">รายชื่อสมาชิกชมรม</span>
                <button onclick="handleIssueCerts()" id="btn-issue-certs" disabled
                    class="bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700 transition disabled:bg-slate-300 disabled:cursor-not-allowed flex items-center gap-2">
                    <i class="fas fa-certificate"></i> ออกใบรับรองให้คนที่เลือก
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100 text-xs uppercase text-slate-500 font-bold">
                        <tr>
                            <th class="px-6 py-4 w-10">
                                <input type="checkbox" id="select-all-members" onchange="toggleSelectAll(this)"
                                    class="w-4 h-4 rounded border-slate-300">
                            </th>
                            <th class="px-6 py-4">รหัสนักศึกษา</th>
                            <th class="px-6 py-4">ชื่อสมาชิก</th>
                            <th class="px-6 py-4">วันที่เข้าร่วม</th>
                        </tr>
                    </thead>
                    <tbody id="cert-member-list" class="divide-y divide-slate-50">
                        <tr>
                            <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                <i class="fas fa-users text-4xl mb-2 block"></i>
                                กรุณาเลือกชมรมเพื่อดูรายชื่อสมาชิก
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="temp-activities">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-800">จัดการกิจกรรม</h2>
                <p class="text-slate-500">สร้างกิจกรรม, บันทึกเวลาสมาชิก และส่งแจ้งเตือน</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-3xl border border-slate-200 h-fit shadow-sm">
                <h3 class="text-lg font-bold mb-6 text-blue-600 flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> สร้างกิจกรรมใหม่
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">เลือกชมรม <span
                                class="text-red-500">*</span></label>
                        <select id="act-club"
                            class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="">-- เลือกชมรม --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">ชื่อกิจกรรม</label>
                        <input type="text" id="act-name" placeholder="เช่น ปฐมนิเทศชมรม"
                            class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">คำอธิบาย</label>
                        <textarea id="act-desc" placeholder="รายละเอียดเบื้องต้น..."
                            class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 h-24"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">วันที่กิจกรรม</label>
                            <input type="datetime-local" id="act-date"
                                class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">ชั่วโมงที่ได้รับ</label>
                            <input type="number" id="act-hours" placeholder="เช่น 2.0" step="0.5"
                                class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <button onclick="handleCreateActivity()"
                        class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                        <i class="fas fa-save mr-1"></i> สร้างกิจกรรม
                    </button>
                </div>
            </div>

            <div id="act-list-container"
                class="lg:col-span-2 bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="p-5 border-b bg-slate-50 font-bold text-slate-600">
                    รายการกิจกรรม
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-xs uppercase text-slate-500 font-bold">
                            <tr>
                                <th class="px-6 py-4">กิจกรรม</th>
                                <th class="px-6 py-4">วันที่</th>
                                <th class="px-6 py-4">ชม.</th>
                                <th class="px-6 py-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="activity-list" class="divide-y divide-slate-100">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Attendance Modal -->
        <div id="attendance-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center"
            style="display:none;">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl mx-4 max-h-[85vh] flex flex-col">
                <div class="p-6 border-b bg-slate-50 rounded-t-3xl flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800"><i
                                class="fas fa-user-check mr-2 text-emerald-600"></i>บันทึกเวลาสมาชิก</h3>
                        <p id="modal-activity-name" class="text-sm text-slate-500 mt-1"></p>
                    </div>
                    <button onclick="closeAttendanceModal()" class="text-slate-400 hover:text-slate-700 text-xl p-2"><i
                            class="fas fa-times"></i></button>
                </div>
                <div class="p-6 overflow-y-auto flex-grow">
                    <div class="flex justify-between items-center mb-4">
                        <label class="flex items-center gap-2 text-sm text-slate-600">
                            <input type="checkbox" id="select-all-attend" onchange="toggleSelectAllAttend(this)"
                                class="w-4 h-4 rounded">
                            เลือกทั้งหมด
                        </label>
                        <span id="attend-count"
                            class="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">0 คน</span>
                    </div>
                    <div id="attendance-list" class="space-y-2"></div>
                </div>
                <div class="p-6 border-t bg-slate-50 rounded-b-3xl flex justify-end gap-3">
                    <button onclick="closeAttendanceModal()"
                        class="px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-200 transition">ยกเลิก</button>
                    <button onclick="submitAttendance()"
                        class="bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-100">
                        <i class="fas fa-check mr-1"></i> บันทึกชั่วโมง
                    </button>
                </div>
            </div>
        </div>
    </template>
    <script>
        // ฟังก์ชันตรวจสอบการล็อกอิน
        function checkAuth() {
            fetch('/api/auth/check')
                .then(res => res.json())
                .then(data => {
                    if (data.status !== 'success' || data.role !== 'admin') {
                        window.location.href = '../dashboard/main.html';
                    }
                })
                .catch(err => console.error("Auth Check Error:", err));
        }

        // ฟังก์ชันสลับ Tab
        function switchTab(tabId) {
            const display = document.getElementById('main-display');
            const template = document.getElementById('temp-' + tabId);

            display.innerHTML = '';
            display.appendChild(template.content.cloneNode(true));

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + tabId).classList.add('tab-active');

            // เรียกฟังก์ชันโหลดข้อมูลตามหน้า
            if (tabId === 'clubs') loadClubs();
            if (tabId === 'roles') loadRoles();
            if (tabId === 'certs') loadCertsView();
            if (tabId === 'activities') loadActivities();
        }

        function loadClubs() {
            const list = document.getElementById('club-list');
            if (!list) return;

            list.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังโหลดข้อมูล...</td></tr>';

            fetch('/api/clubs/list')
                .then(res => res.json())
                .then(data => {
                    list.innerHTML = '';
                    if (data.status === 'success' && data.data.length > 0) {
                        data.data.forEach(item => {
                            list.innerHTML += `
                                <tr class="hover:bg-slate-50 transition">
                                    <td class="px-6 py-4 font-medium text-slate-900 border-b border-slate-100">${item.Club_ID}</td>
                                    <td class="px-6 py-4 font-bold text-blue-600 border-b border-slate-100">
                                        <div class="flex items-center gap-3">
                                            ${item.Club_Image ? `<img src="/uploads/${item.Club_Image}" class="w-10 h-10 rounded-lg object-cover bg-slate-200">` : `<div class="w-10 h-10 rounded-lg bg-blue-100 text-blue-500 flex items-center justify-center"><i class="fas fa-users"></i></div>`}
                                            <span>${item.Name_Club}</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-slate-500 border-b border-slate-100">
                                        <span class="bg-slate-100 px-3 py-1 rounded-full text-xs font-medium">${item.Club_type || 'ทั่วไป'}</span>
                                    </td>
                                    <td class="px-6 py-4 text-center border-b border-slate-100">
                                        <div class="action-buttons space-x-2">
                                            <button onclick="handleDeleteClub(${item.Club_ID}, '${item.Name_Club.replace(/'/g, "\\'")}')"
                                               class="btn-action btn-delete inline-block px-3 py-1.5 bg-red-100 text-red-600 rounded hover:bg-red-500 hover:text-white transition">
                                               <i class="fas fa-trash-alt"></i> ลบ
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        });
                    } else {
                        list.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-slate-400">ยังไม่มีข้อมูลชมรม</td></tr>';
                    }
                })
                .catch(err => {
                    console.error('Error fetching clubs:', err);
                    list.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</td></tr>';
                });
        }

        function handleDeleteClub(clubId, clubName) {
            if (!confirm(`⚠️ ยืนยันการลบชมรม "${clubName}"?`)) return;

            fetch('/api/clubs/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: clubId })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        loadClubs();
                    } else {
                        alert('เกิดข้อผิดพลาด: ' + data.message);
                    }
                })
                .catch(err => {
                    console.error('Delete Club Error:', err);
                    alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
                });
        }

        function loadRoles() {
            const list = document.getElementById('roles-list');
            if (!list) return;

            list.innerHTML = '<div class="p-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังโหลดข้อมูล...</div>';

            fetch('/api/clubs/roles')
                .then(res => res.json())
                .then(data => {
                    list.innerHTML = '';
                    if (data.status === 'success' && data.data && data.data.length > 0) {
                        data.data.forEach(item => {
                            // จัดการแสดงผลข้อมูล โดยเช็คตัวแปรแบบหลวมๆ เผื่อกรณีคอลัมน์แตกต่างกัน
                            const displayName = item.Username || item.Name || 'ไม่ระบุชื่อ';
                            const studentId = item.Student_ID || '-';
                            const role = item.Role || item.role || 'Admin';

                            list.innerHTML += `
                                <div class="flex items-center justify-between p-4 border-b border-slate-100 hover:bg-slate-50 transition">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center shrink-0">
                                            <i class="fas fa-user-shield"></i>
                                        </div>
                                        <div>
                                            <div class="font-bold text-slate-800">${displayName}</div>
                                            <div class="text-xs text-slate-500">รหัสนักศึกษา: ${studentId} | สิทธิ์: ${role}</div>
                                        </div>
                                    </div>
                                    <button class="px-3 py-1.5 text-sm bg-red-50 text-red-600 rounded-lg hover:bg-red-500 hover:text-white transition"
                                        onclick="removeRole('${studentId}')">
                                        <i class="fas fa-user-minus"></i> ลบสิทธิ์
                                    </button>
                                </div>
                            `;
                        });
                    } else {
                        list.innerHTML = '<div class="p-8 text-center text-slate-400">ไม่พบรายชื่อผู้มีสิทธิ์จัดการ</div>';
                    }
                })
                .catch(err => {
                    console.error('Error fetching roles:', err);
                    list.innerHTML = '<div class="p-8 text-center text-red-500">เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูล</div>';
                });
        }

        function removeRole(studentId) {
            if (!confirm('⚠️ ยืนยันการปลดสิทธิ์ผู้จัดการของรหัส ' + studentId + '?')) return;

            fetch(`/api/clubs/roles?remove_id=${studentId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        loadRoles();
                    } else {
                        alert('เกิดข้อผิดพลาด: ' + data.message);
                    }
                })
                .catch(err => {
                    console.error('Remove Role Error:', err);
                    alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
                });
        }

        function loadCertsView() {
            const selectClub = document.getElementById('select-cert-club');
            if (!selectClub) return;

            fetch('/api/clubs/list')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        selectClub.innerHTML = '<option value="">-- เลือกชมรม --</option>';
                        data.data.forEach(club => {
                            const option = document.createElement('option');
                            option.value = club.Club_ID;
                            option.textContent = club.Name_Club;
                            selectClub.appendChild(option);
                        });
                    }
                });
        }

        function loadMembersForCerts(clubId) {
            const list = document.getElementById('cert-member-list');
            const btn = document.getElementById('btn-issue-certs');
            if (!list) return;

            if (!clubId) {
                list.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400">กรุณาเลือกชมรมเพื่อดูรายชื่อสมาชิก</td></tr>';
                btn.disabled = true;
                return;
            }

            list.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังโหลดรายชื่อสมาชิก...</td></tr>';

            fetch(`/api/clubs/members?club_id=${clubId}`)
                .then(res => res.json())
                .then(data => {
                    list.innerHTML = '';
                    if (data.status === 'success' && data.data.length > 0) {
                        data.data.forEach(member => {
                            list.innerHTML += `
                                <tr class="hover:bg-slate-50 transition">
                                    <td class="px-6 py-4">
                                        <input type="checkbox" name="member-checkbox" value="${member.Student_ID}" 
                                            class="member-cb w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500"
                                            onchange="updateIssueButton()">
                                    </td>
                                    <td class="px-6 py-4 font-medium text-slate-700">${member.Student_ID}</td>
                                    <td class="px-6 py-4 text-slate-800">${member.Username}</td>
                                    <td class="px-6 py-4 text-slate-500">${new Date(member.Join_Date).toLocaleDateString('th-TH')}</td>
                                </tr>
                            `;
                        });
                        btn.disabled = true;
                    } else {
                        list.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400">ยังไม่มีสมาชิกในชมรมนี้</td></tr>';
                        btn.disabled = true;
                    }
                });
        }

        function toggleSelectAll(source) {
            const checkboxes = document.querySelectorAll('input[name="member-checkbox"]');
            checkboxes.forEach(cb => cb.checked = source.checked);
            updateIssueButton();
        }

        function updateIssueButton() {
            const checkboxes = document.querySelectorAll('input[name="member-checkbox"]:checked');
            const btn = document.getElementById('btn-issue-certs');
            if (btn) btn.disabled = checkboxes.length === 0;
        }

        function handleIssueCerts() {
            const clubId = document.getElementById('select-cert-club').value;
            const selectedIds = Array.from(document.querySelectorAll('input[name="member-checkbox"]:checked'))
                .map(cb => cb.value);

            if (selectedIds.length === 0) return;

            if (!confirm(`⚠️ ยืนยันการออกใบรับรองให้กับนักศึกษาจำนวน ${selectedIds.length} ท่าน?`)) return;

            fetch('/api/clubs/issue_certs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    club_id: clubId,
                    student_ids: selectedIds
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        // ล้างการเลือก
                        document.querySelectorAll('input[name="member-checkbox"]').forEach(cb => cb.checked = false);
                        const selAll = document.getElementById('select-all-members');
                        if (selAll) selAll.checked = false;
                        updateIssueButton();
                    } else {
                        alert('เกิดข้อผิดพลาด: ' + data.message);
                    }
                })
                .catch(err => {
                    console.error('Issue Certs Error:', err);
                    alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
                });
        }

        let currentAttendanceActivityId = null;
        let currentActivityName = "";

        function loadActivities() {
            const list = document.getElementById('activity-list');
            if (!list) return;

            // โหลด dropdown ชมรมสำหรับสร้างกิจกรรม
            const clubSelect = document.getElementById('act-club');
            if (clubSelect && clubSelect.options.length <= 1) {
                fetch('/api/clubs/list').then(r => r.json()).then(d => {
                    if (d.status === 'success') {
                        d.data.forEach(c => {
                            const opt = document.createElement('option');
                            opt.value = c.Club_ID;
                            opt.textContent = c.Name_Club;
                            clubSelect.appendChild(opt);
                        });
                    }
                });
            }

            list.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังโหลด...</td></tr>';

            fetch(`/api/activities/list`)
                .then(res => res.json())
                .then(data => {
                    list.innerHTML = '';
                    if (data.status === 'success' && data.data.length > 0) {
                        data.data.forEach(act => {
                            const date = new Date(act.Activity_Date).toLocaleString('th-TH', {
                                dateStyle: 'medium',
                                timeStyle: 'short'
                            });
                            // Escape single quotes for activity name
                            const safeName = act.Activity_Name.replace(/'/g, "\\'");
                            list.innerHTML += `
                                <tr class="hover:bg-slate-50">
                                    <td class="px-6 py-4">
                                        <div class="font-bold text-slate-800">${act.Activity_Name}</div>
                                        <div class="text-xs text-slate-400 truncate w-40">${act.Description || '-'}</div>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-slate-600">${date}</td>
                                    <td class="px-6 py-4">
                                        <span class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-lg font-bold">${act.Hours_Given}</span>
                                    </td>
                                    <td class="px-6 py-4 text-center space-x-1">
                                        <button onclick="openAttendanceModal(${act.Activity_ID}, '${safeName}', ${act.Hours_Given})"
                                            class="px-3 py-1.5 bg-emerald-100 text-emerald-700 rounded-lg hover:bg-emerald-600 hover:text-white transition text-sm font-medium">
                                            <i class="fas fa-user-check mr-1"></i>บันทึกเวลา
                                        </button>
                                        <button onclick="handleNotifyActivity(${act.Activity_ID})"
                                            class="px-3 py-1.5 bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-500 hover:text-white transition text-sm font-medium">
                                            <i class="fas fa-envelope mr-1"></i>แจ้งเตือน
                                        </button>
                                        <button onclick="handleDeleteActivity(${act.Activity_ID})"
                                            class="px-2 py-1.5 text-red-400 hover:text-red-600 transition">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </td>
                                </tr>
                            `;
                        });
                    } else {
                        list.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400">ยังไม่มีข้อมูลกิจกรรม</td></tr>';
                    }
                })
                .catch(err => {
                    console.error('Load Activities Error:', err);
                    list.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-red-400">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
                });
        }

        function openAttendanceModal(activityId, activityName, hours) {
            console.log('Opening Modal for:', activityId, activityName);
            currentAttendanceActivityId = parseInt(activityId);
            currentActivityName = activityName;

            const modal = document.getElementById('attendance-modal');
            if (!modal) return;

            document.getElementById('modal-activity-name').textContent = `${activityName} (${hours} ชม.)`;
            modal.style.display = 'flex';
            modal.classList.remove('hidden');

            const listDiv = document.getElementById('attendance-list');
            listDiv.innerHTML = '<div class="text-center py-8 text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังโหลดรายชื่อ...</div>';

            document.getElementById('select-all-attend').checked = false;
            updateAttendCount();

            fetch(`/api/activities/attendees?activity_id=${activityId}`)
                .then(r => r.json())
                .then(data => {
                    listDiv.innerHTML = '';
                    if (data.status === 'success' && data.data.length > 0) {
                        data.data.forEach(m => {
                            const isChecked = m.checked_in;
                            const checkedAttr = isChecked ? 'checked disabled' : '';
                            const label = isChecked ? '<span class="text-xs text-emerald-600 font-medium ml-2">✅ บันทึกแล้ว</span>' : '';
                            listDiv.innerHTML += `
                                <div class="flex items-center justify-between p-3 rounded-xl border border-slate-100 ${isChecked ? 'bg-slate-50' : 'hover:bg-slate-50'} transition">
                                    <label class="flex items-center gap-3 flex-grow ${isChecked ? 'cursor-default' : 'cursor-pointer'}">
                                        <input type="checkbox" name="attend-cb" value="${m.Student_ID}" ${checkedAttr}
                                            class="w-4 h-4 rounded text-emerald-600" onchange="updateAttendCount()">
                                        <div>
                                            <div class="font-medium text-slate-800">${m.First_Name} ${m.Last_Name}</div>
                                            <div class="text-xs text-slate-400">${m.Student_ID} • ${m.Username}</div>
                                        </div>
                                    </label>
                                    ${label}
                                </div>`;
                        });
                        updateAttendCount();
                    } else {
                        listDiv.innerHTML = `<div class="text-center py-8 text-slate-400">${data.message || 'ยังไม่มีสมาชิกในชมรมนี้'}</div>`;
                    }
                })
                .catch(err => {
                    console.error('Fetch Attendees Error:', err);
                    listDiv.innerHTML = '<div class="text-center py-8 text-red-400">เกิดข้อผิดพลาดในการโหลดรายชื่อ</div>';
                });
        }

        function closeAttendanceModal() {
            const modal = document.getElementById('attendance-modal');
            if (modal) {
                modal.style.display = 'none';
                modal.classList.add('hidden');
            }
            currentAttendanceActivityId = null;
        }

        function toggleSelectAllAttend(source) {
            document.querySelectorAll('input[name="attend-cb"]:not(:disabled)').forEach(cb => cb.checked = source.checked);
            updateAttendCount();
        }

        function updateAttendCount() {
            const count = document.querySelectorAll('input[name="attend-cb"]:checked:not(:disabled)').length;
            const el = document.getElementById('attend-count');
            if (el) el.textContent = `${count} คนที่เลือก`;
        }

        function submitAttendance() {
            const ids = Array.from(document.querySelectorAll('input[name="attend-cb"]:checked:not(:disabled)')).map(cb => cb.value);
            if (ids.length === 0) {
                alert('กรุณาเลือกสมาชิกอย่างน้อย 1 คน (ที่ยังไม่ได้บันทึกเวลา)');
                return;
            }

            if (!confirm(`ยืนยันบันทึกชั่วโมงให้ ${ids.length} คน?`)) return;

            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> กำลังบันทึก...';

            fetch('/api/activities/admin_checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    activity_id: currentAttendanceActivityId,
                    student_ids: ids
                })
            })
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false;
                    btn.innerHTML = originalText;

                    if (data.status === 'success') {
                        alert(`✅ ${data.message}` + (data.email_queued ? `\n📧 ระบบกำลังส่งอีเมลแจ้งสมาชิกในพื้นหลัง...` : ''));
                        // โหลดรายชื่อใหม่เพื่ออัปเดตสถานะติ๊กถูก
                        const hoursText = document.getElementById('modal-activity-name').textContent.match(/\((.*?) ชม\.\)/)[1];
                        openAttendanceModal(currentAttendanceActivityId, currentActivityName, hoursText);
                    } else {
                        alert('❌ เกิดข้อผิดพลาด: ' + data.message);
                    }
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    console.error('Submit Attendance Error:', err);
                    alert('❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้');
                });
        }

        function handleNotifyActivity(activityId) {
            if (!confirm('ส่งอีเมลแจ้งเตือนกิจกรรมนี้ให้สมาชิกชมรมทุกคน?')) return;
            fetch('/api/activities/notify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ activity_id: activityId })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') { alert('📧 ' + data.message); }
                    else { alert('❌ ' + data.message); }
                });
        }

        function handleCreateActivity() {
            const clubId = document.getElementById('act-club').value;
            const name = document.getElementById('act-name').value;
            const desc = document.getElementById('act-desc').value;
            const date = document.getElementById('act-date').value;
            const hours = document.getElementById('act-hours').value;

            if (!clubId || !name || !date || !hours) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วน (รวมถึงเลือกชมรม)');
                return;
            }

            fetch('/api/activities/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ club_id: clubId, activity_name: name, description: desc, activity_date: date, hours: hours })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert(data.message);
                        document.getElementById('act-club').value = '';
                        document.getElementById('act-name').value = '';
                        document.getElementById('act-desc').value = '';
                        document.getElementById('act-date').value = '';
                        document.getElementById('act-hours').value = '';
                        loadActivities();
                    } else { alert('เกิดข้อผิดพลาด: ' + data.message); }
                });
        }

        function handleDeleteActivity(id) {
            if (!confirm('ยืนยันที่จะลบกิจกรรมนี้? (ข้อมูลการเช็คอินจะหายไปด้วย)')) return;

            fetch('/api/activities/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ activity_id: id })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') { alert(data.message); loadActivities(); }
                    else { alert('เกิดข้อผิดพลาด: ' + data.message); }
                });
        }

        // เริ่มต้นทำงาน
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            switchTab('clubs');
        });
    </script>
</body>

</html>
