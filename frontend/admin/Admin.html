<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab-active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
            font-weight: 600;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-gradient-to-r from-blue-700 to-blue-500 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../dashboard/main.html" class="flex items-center space-x-3 select-none">
                <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-users-cog text-2xl"></i></div>
                <span class="text-2xl font-bold tracking-wide">ClubHub <span
                        class="text-sm font-light opacity-80">Admin</span></span>
            </a>
            <div class="flex items-center space-x-4">
                <a href="../dashboard/main.html"
                    class="px-3 py-2 rounded-lg hover:bg-white/10 transition">หน้าผู้ใช้งาน</a>
                <div class="w-px h-6 bg-white/30"></div>
                <button class="bg-slate-900/40 px-4 py-2 rounded-lg border border-white/10">
                    <i class="fas fa-shield-alt mr-2"></i>โหมด Admin
                </button>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b border-slate-200 sticky top-[72px] z-40">
        <div class="container mx-auto px-6 flex space-x-8 overflow-x-auto">
            <button onclick="switchTab('clubs')" id="btn-clubs"
                class="tab-item px-2 py-4 text-slate-500 hover:text-blue-600 transition-all flex items-center gap-2 tab-active">
                <i class="fas fa-th-large"></i> จัดการชมรม
            </button>
            <button onclick="switchTab('roles')" id="btn-roles"
                class="tab-item px-2 py-4 text-slate-500 hover:text-blue-600 transition-all flex items-center gap-2">
                <i class="fas fa-user-shield"></i> จัดการสิทธิ์
            </button>
            <button onclick="switchTab('certs')" id="btn-certs"
                class="tab-item px-2 py-4 text-slate-500 hover:text-blue-600 transition-all flex items-center gap-2">
                <i class="fas fa-certificate"></i> ออกใบเซอร์
            </button>
        </div>
    </div>

    <main id="main-display" class="container mx-auto px-6 py-8 flex-grow fade-in">
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 text-center text-slate-400 text-sm">
        &copy; 2026 ClubHub Management System.
    </footer>

    <template id="temp-clubs">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-bold text-slate-800">จัดการชมรม</h2>
                <p class="text-slate-500">บริหารจัดการข้อมูลชมรมในระบบ</p>
            </div>
            <a href="create_club.html"
                class="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-100 flex items-center gap-2">
                <i class="fas fa-plus"></i> สร้างชมรมใหม่
            </a>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100 text-xs uppercase text-slate-500 font-bold">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">ชื่อชมรม</th>
                        <th class="px-6 py-4">ประเภท</th>
                        <th class="px-6 py-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="club-list" class="divide-y divide-slate-50">
                </tbody>
            </table>
        </div>
    </template>

    <template id="temp-roles">
        <h2 class="text-3xl font-bold mb-6">จัดการสิทธิ์ผู้ใช้งาน</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 bg-white p-6 rounded-2xl border border-slate-200 h-fit">
                <h3 class="font-bold mb-4 text-blue-600">แต่งตั้งสิทธิ์ใหม่</h3>
                <div class="space-y-4">
                    <input type="text" id="input-username" placeholder="รหัสนักศึกษา / Username"
                        class="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="select-club"
                        class="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">-- เลือกชมรม --</option>
                    </select>
                    <button
                        class="w-full bg-green-600 text-white py-2.5 rounded-xl font-bold hover:bg-green-700 transition">ยืนยัน</button>
                </div>
            </div>
            <div class="md:col-span-2 bg-white rounded-2xl border border-slate-200 overflow-hidden">
                <div class="p-4 border-b bg-slate-50 font-bold text-slate-600">รายชื่อผู้มีสิทธิ์จัดการ</div>
                <div id="roles-list">
                </div>
            </div>
        </div>
    </template>

    <template id="temp-certs">
        <h2 class="text-3xl font-bold mb-6">ออกใบรับรอง (Certificate)</h2>
        <div class="bg-white p-8 rounded-2xl border border-slate-200 text-center">
            <i class="fas fa-certificate text-5xl text-slate-200 mb-4"></i>
            <p class="text-slate-500">เลือกกิจกรรมและอัปโหลดรายชื่อเพื่อออกใบรับรอง</p>
        </div>
    </template>

    <script>
        // ฟังก์ชันตรวจสอบการล็อกอิน
        function checkAuth() {
            fetch('../../backend/auth/check_auth.php')
                .then(res => res.json())
                .then(data => {
                    if (data.status !== 'success' || data.role !== 'admin') {
                        window.location.href = '../dashboard/main.html';
                    }
                })
                .catch(err => console.error("Auth Check Error:", err));
        }

        // ฟังก์ชันสลับ Tab
        function switchTab(tabId) {
            const display = document.getElementById('main-display');
            const template = document.getElementById('temp-' + tabId);

            display.innerHTML = '';
            display.appendChild(template.content.cloneNode(true));

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + tabId).classList.add('tab-active');

            // เรียกฟังก์ชันโหลดข้อมูลตามหน้า
            if (tabId === 'clubs') loadClubs();
            if (tabId === 'roles') loadRoles();
        }

        function loadClubs() {
            const list = document.getElementById('club-list');
            if (!list) return;

            list.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังโหลดข้อมูล...</td></tr>';

            fetch('../../backend/clubs/get_clubs.php')
                .then(res => res.json())
                .then(data => {
                    list.innerHTML = '';
                    if (data.status === 'success' && data.data.length > 0) {
                        data.data.forEach(item => {
                            list.innerHTML += `
                                <tr class="hover:bg-slate-50 transition">
                                    <td class="px-6 py-4 font-medium text-slate-900 border-b border-slate-100">${item.Club_ID}</td>
                                    <td class="px-6 py-4 font-bold text-blue-600 border-b border-slate-100">
                                        <div class="flex items-center gap-3">
                                            ${item.Club_Image ? `<img src="../../uploads/${item.Club_Image}" class="w-10 h-10 rounded-lg object-cover bg-slate-200">` : `<div class="w-10 h-10 rounded-lg bg-blue-100 text-blue-500 flex items-center justify-center"><i class="fas fa-users"></i></div>`}
                                            <span>${item.Name_Club}</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-slate-500 border-b border-slate-100">
                                        <span class="bg-slate-100 px-3 py-1 rounded-full text-xs font-medium">${item.Club_type || 'ทั่วไป'}</span>
                                    </td>
                                    <td class="px-6 py-4 text-center border-b border-slate-100">
                                        <div class="action-buttons space-x-2">
                                            <a href="edit_club.html?id=${item.Club_ID}" 
                                               class="btn-action btn-edit inline-block px-3 py-1.5 bg-blue-100 text-blue-600 rounded hover:bg-blue-500 hover:text-white transition"
                                               onclick="return confirm('ยืนยันที่จะแก้ไขข้อมูลชมรม ${item.Name_Club}?');">
                                               <i class="fas fa-edit"></i> แก้ไข
                                            </a>

                                            <a href="../../backend/clubs/delete_club.php?id=${item.Club_ID}" 
                                               class="btn-action btn-delete inline-block px-3 py-1.5 bg-red-100 text-red-600 rounded hover:bg-red-500 hover:text-white transition"
                                               onclick="return confirm('⚠️ ยืนยันการลบข้อมูลชมรมนี้?');">
                                               <i class="fas fa-trash-alt"></i> ลบ
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        });
                    } else {
                        list.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-slate-400">ยังไม่มีข้อมูลชมรม</td></tr>';
                    }
                })
                .catch(err => {
                    console.error('Error fetching clubs:', err);
                    list.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</td></tr>';
                });
        }

        function loadRoles() {
            console.log("Loading roles from database...");
        }

        // เริ่มต้นทำงาน
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            switchTab('clubs');
        });
    </script>
</body>

</html>
