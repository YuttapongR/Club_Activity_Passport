<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างชมรมใหม่ - ClubHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Navigation (Admin Style) -->
    <nav class="bg-gradient-to-r from-blue-700 to-blue-500 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="Admin.html" class="flex items-center space-x-3 select-none">
                <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-users-cog text-xl"></i></div>
                <span class="text-xl font-bold tracking-wide">ClubHub <span
                        class="text-sm font-light opacity-80">Admin</span></span>
            </a>
            <div class="flex items-center space-x-4">
                <a href="Admin.html"
                    class="flex items-center space-x-2 px-3 py-2 border border-white/30 rounded-lg hover:bg-white/10 transition text-sm">
                    <i class="fas fa-arrow-left"></i>
                    <span>กลับไปหน้าจัดการ</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-10 flex-grow flex justify-center items-start">
        <div
            class="bg-white max-w-2xl w-full rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in mt-4">

            <div class="bg-blue-50/50 px-8 py-6 border-b border-slate-100 flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center text-xl shadow-inner">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">สร้างชมรมใหม่</h1>
                    <p class="text-slate-500 text-sm mt-1">กรอกรายละเอียดเพื่อเปิดรับสมัครสมาชิกชมรมในระบบ</p>
                </div>
            </div>

            <form action="../../backend/clubs/create_club.php" method="POST" enctype="multipart/form-data"
                class="p-8 space-y-6">
                <!-- Club Name -->
                <div>
                    <label for="club_name" class="block text-sm font-semibold text-slate-700 mb-2">ชื่อชมรม <span
                            class="text-red-500">*</span></label>
                    <input type="text" id="club_name" name="club_name" required placeholder="ระบุชื่อชมรมของคุณ"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all bg-slate-50 focus:bg-white">
                </div>

                <!-- Category & Max Members -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="category" class="block text-sm font-semibold text-slate-700 mb-2">ประเภทชมรม <span
                                class="text-red-500">*</span></label>
                        <select id="category" name="category" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all bg-slate-50 focus:bg-white appearance-none">
                            <option value="">-- เลือกประเภท --</option>
                            <option value="academic">วิชาการ</option>
                            <option value="sports">กีฬาและนันทนาการ</option>
                            <option value="arts">ศิลปะและวัฒนธรรม</option>
                            <option value="social">บำเพ็ญประโยชน์</option>
                            <option value="tech">เทคโนโลยีและนวัตกรรม</option>
                            <option value="other">อื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label for="max_members"
                            class="block text-sm font-semibold text-slate-700 mb-2">จำนวนสมาชิกที่รับ (คน)</label>
                        <input type="number" id="max_members" name="max_members" min="1"
                            placeholder="ไม่มีจำนวนจำกัดให้เว้นว่าง"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all bg-slate-50 focus:bg-white">
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label for="description"
                        class="block text-sm font-semibold text-slate-700 mb-2">รายละเอียดและวัตถุประสงค์ชมรม</label>
                    <textarea id="description" name="description" rows="4"
                        placeholder="แนะนำชมรม กิจกรรมหลัก หรือวัตถุประสงค์..."
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all bg-slate-50 focus:bg-white resize-none"></textarea>
                </div>

                <!-- Club Image Cover/Logo -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">โปสเตอร์ / โลโก้ชมรม</label>
                    <div
                        class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-xl hover:border-blue-400 hover:bg-blue-50/30 transition-all cursor-pointer relative group">
                        <div class="space-y-2 text-center">
                            <i
                                class="fas fa-cloud-upload-alt text-3xl text-slate-400 group-hover:text-blue-500 transition-colors"></i>
                            <div class="flex text-sm text-slate-600 justify-center">
                                <label for="club_image"
                                    class="relative cursor-pointer rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                                    <span>อัปโหลดรูปภาพ</span>
                                    <input id="club_image" name="club_image" type="file" class="sr-only"
                                        accept="image/*">
                                </label>
                                <p class="pl-1">หรือลากวางที่นี่</p>
                            </div>
                            <p class="text-xs text-slate-500">PNG, JPG หรือ GIF ขนาดไม่เกิน 5MB</p>
                        </div>
                    </div>
                </div>

                <!-- Status Checkbox -->
                <div class="flex items-start bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <div class="flex items-center h-5">
                        <input id="status_active" name="status" type="checkbox" checked value="active"
                            class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 focus:ring-2">
                    </div>
                    <div class="ml-3 text-sm">
                        <label for="status_active" class="font-medium text-slate-700">เปิดรับสมัครทันที</label>
                        <p class="text-slate-500 font-light mt-0.5">
                            นักศึกษาจะสามารถเห็นและสมัครเข้าชมรมนี้ได้ทันทีหลังจากบันทึก</p>
                    </div>
                </div>

                <!-- Actions -->
                <div class="pt-6 border-t border-slate-100 flex items-center justify-end gap-4">
                    <a href="Admin.html"
                        class="px-6 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition">
                        ยกเลิก
                    </a>
                    <button type="submit" name="saveclub"
                        class="bg-blue-600 text-white px-8 py-2.5 rounded-xl font-medium hover:bg-blue-700 transition shadow-lg shadow-blue-100 flex items-center gap-2">
                        <i class="fas fa-save"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 mt-auto text-center text-slate-400 text-sm">
        &copy; 2026 ClubHub Management System.
    </footer>

    <script>
        // ทำให้อัปโหลดไฟล์โชว์ชื่อไฟล์ได้
        document.getElementById('club_image').addEventListener('change', function (e) {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                const label = this.parentElement.nextElementSibling;
                label.textContent = "เลือกไฟล์แล้ว: " + fileName;
                label.classList.add('text-blue-600');
            }
        });
    </script>
</body>

</html>
