<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-gradient-to-r from-blue-700 to-blue-500 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="main.html" class="flex items-center space-x-3 select-none">
                <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-users-cog text-2xl"></i></div>
                <span class="text-2xl font-bold tracking-wide">ClubHub</span>
            </a>
            <div class="flex items-center space-x-4">
                <a href="main.html"
                    class="bg-slate-900/40 px-3 py-2 rounded-lg font-medium border border-white/10">หน้าผู้ใช้งาน</a>
                <div class="w-px h-6 bg-white/30 hidden sm:block"></div>
                <a href="admin.html" id="admin-btn"
                    class="hidden px-4 py-2 rounded-lg font-medium hover:bg-white/10 transition">
                    <i class="fas fa-shield-alt mr-2"></i>โหมด Admin
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10 flex-grow">

        <header class="flex flex-col md:flex-row md:justify-between md:items-end mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">ชมรมที่เปิดรับสมัคร</h2>
                <p class="text-slate-500">ค้นพบสิ่งใหม่ๆ และร่วมเป็นส่วนหนึ่งของชุมชนของเรา</p>
            </div>
            <div class="relative w-full md:w-72">
                <input type="text" id="search-input" placeholder="ค้นหาชมรม..."
                    class="w-full pl-11 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 shadow-sm outline-none transition">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
            </div>
        </header>

        <div id="club-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in">
            <div class="col-span-full text-center py-20 text-slate-400">
                <i class="fas fa-folder-open text-5xl mb-4 block"></i>
                <p>กำลังโหลดข้อมูลชมรม...</p>
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-slate-200 mt-10">
        <div class="container mx-auto px-6 py-8 text-center text-slate-500 text-sm">
            <p>&copy; 2026 ClubHub Management System. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // ฟังก์ชันสร้างการ์ด HTML (ใช้ซ้ำได้)
        function createClubCard(club) {
            return `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition duration-300 flex flex-col group">
                    <div class="h-44 bg-gradient-to-br ${club.color || 'from-slate-400 to-slate-500'} flex items-center justify-center text-white relative">
                        <span class="absolute top-3 right-3 bg-white/20 px-3 py-1 rounded-full text-xs backdrop-blur-sm border border-white/30">${club.tag}</span>
                        <i class="fas ${club.icon} fa-4x group-hover:scale-110 transition duration-300"></i>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="text-xl font-bold mb-2">${club.title}</h3>
                        <p class="text-slate-500 text-sm flex-grow mb-6">${club.desc}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-100">
                            <span class="text-sm font-semibold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg">
                                <i class="fas fa-user-friends mr-2"></i> ${club.members}
                            </span>
                            <button class="bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 active:scale-95 transition shadow-sm">เข้าร่วมเลย</button>
                        </div>
                    </div>
                </div>`;
        }

        document.addEventListener('DOMContentLoaded', function () {
            // 1. ตรวจสอบสิทธิ์และสถานะการล็อกอิน
            fetch('../backend/check_auth.php')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        if (data.role === 'admin') document.getElementById('admin-btn')?.classList.remove('hidden');
                        loadClubData(); // ถ้าล็อกอินแล้วให้โหลดข้อมูลชมรม
                    } else {
                        window.location.href = 'login.html';
                    }
                })
                .catch(err => console.error('Auth Error:', err));
        });

        // ฟังก์ชันสำหรับดึงข้อมูลชมรมจาก Database
        function loadClubData() {
            const grid = document.getElementById('club-grid');

            /* ส่วนนี้ให้คุณใช้ fetch ไปที่ไฟล์ PHP ที่ดึงข้อมูลจากตาราง club
               ตัวอย่าง: fetch('../backend/get_clubs.php')
            */
            console.log("กรุณาเชื่อมต่อ API เพื่อดึงข้อมูลชมรม");
        }
    </script>
</body>

</html>
