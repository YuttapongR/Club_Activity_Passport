<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Management System</title>
    <!-- CSS Resources -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- 1. Navigation Bar -->
    <nav class="bg-gradient-to-r from-blue-700 to-blue-500 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <!-- Logo -->
            <a href="main.html" class="flex items-center space-x-3 select-none">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i class="fas fa-users-cog text-2xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-wide">ClubHub</span>
            </a>

            <!-- Nav Links -->
            <div class="flex items-center space-x-4">
                <a href="main.html" class="bg-slate-900/40 px-3 py-2 rounded-lg font-medium border border-white/10">
                    หน้าผู้ใช้งาน
                </a>
                <div class="w-px h-6 bg-white/30 hidden sm:block"></div>
                <a href="../admin/Admin.html" id="admin-btn"
                    class="hidden px-4 py-2 rounded-lg font-medium hover:bg-white/10 transition">
                    <i class="fas fa-shield-alt mr-2"></i>โหมด Admin
                </a>
            </div>
        </div>
    </nav>

    <!-- 2. Main Content -->
    <main class="container mx-auto px-6 py-10 flex-grow">

        <!-- Header & Search -->
        <header class="flex flex-col md:flex-row md:justify-between md:items-end mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">ชมรมที่เปิดรับสมัคร</h2>
                <p class="text-slate-500">ค้นพบสิ่งใหม่ๆ และร่วมเป็นส่วนหนึ่งของชุมชนของเรา</p>
            </div>

            <div class="relative w-full md:w-72">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                <input type="text" id="search-input" placeholder="ค้นหาชมรม..."
                    class="w-full pl-11 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 shadow-sm outline-none transition">
            </div>
        </header>

        <!-- Club Grid -->
        <div id="club-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in">
            <!-- Loading State -->
            <div class="col-span-full text-center py-20 text-slate-400">
                <i class="fas fa-folder-open text-5xl mb-4 block"></i>
                <p>กำลังโหลดข้อมูลชมรม...</p>
            </div>
        </div>

    </main>

    <!-- 3. Footer -->
    <footer class="bg-white border-t border-slate-200 mt-10">
        <div class="container mx-auto px-6 py-8 text-center text-slate-500 text-sm">
            <p>&copy; 2026 ClubHub Management System. All rights reserved.</p>
        </div>
    </footer>

    <!-- 4. Club Card Template -->
    <template id="club-card-template">
        <div
            class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition duration-300 flex flex-col group">

            <!-- Card Header (Icon/Image) -->
            <div
                class="card-header h-44 flex items-center justify-center text-white relative bg-gradient-to-br from-slate-400 to-slate-500">
                <div class="card-overlay absolute inset-0 hidden"></div>
                <span
                    class="card-tag absolute top-3 right-3 bg-white/20 px-3 py-1 rounded-full text-xs backdrop-blur-sm border border-white/30 z-10">
                    ทั่วไป
                </span>
                <i class="card-icon fas fa-users fa-4x group-hover:scale-110 transition duration-300 z-10"></i>
            </div>

            <!-- Card Body -->
            <div class="p-6 flex flex-col flex-grow">
                <h3 class="card-title text-xl font-bold mb-2">ชื่อชมรม</h3>
                <p class="card-desc text-slate-500 text-sm flex-grow mb-6">รายละเอียด</p>

                <!-- Card Footer -->
                <div class="flex justify-between items-center pt-4 border-t border-slate-100">
                    <span class="text-sm font-semibold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg">
                        <i class="fas fa-user-friends mr-2"></i> <span class="card-members">0</span>
                    </span>

                    <a href="../../backend/members/join_club.php">
                        <button
                            class="bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 active:scale-95 transition shadow-sm">
                            เข้าร่วมเลย
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </template>

    <!-- 5. Logic Scripts -->
    <script>
        // -- Functions --
        function createClubCardElement(club) {
            const template = document.getElementById('club-card-template');
            const clone = template.content.cloneNode(true);

            const header = clone.querySelector('.card-header');
            const overlay = clone.querySelector('.card-overlay');
            const icon = clone.querySelector('.card-icon');

            // Set Background & Color
            if (club.color) header.className = `card-header h-44 flex items-center justify-center text-white relative bg-gradient-to-br ${club.color}`;

            if (club.customImage?.trim()) {
                header.style.backgroundImage = `url('../../uploads/${club.customImage}')`;
                header.style.backgroundSize = 'cover';
                header.style.backgroundPosition = 'center';
                overlay.classList.remove('hidden');
                overlay.classList.add('bg-black/40');
            }

            // Set Content
            clone.querySelector('.card-tag').textContent = club.tag;
            clone.querySelector('.card-title').textContent = club.title;
            clone.querySelector('.card-desc').textContent = club.desc;
            clone.querySelector('.card-members').textContent = club.members;
            icon.className = `card-icon fas ${club.icon} fa-4x group-hover:scale-110 transition duration-300 z-10`;

            return clone;
        }

        function loadClubData() {
            const grid = document.getElementById('club-grid');
            grid.innerHTML = `
                <div class="col-span-full text-center py-20 text-slate-400">
                    <i class="fas fa-spinner fa-spin text-5xl mb-4 block"></i>
                    <p>กำลังโหลดข้อมูลชมรม...</p>
                </div>`;

            fetch('../../backend/clubs/get_clubs.php')
                .then(res => res.json())
                .then(data => {
                    grid.innerHTML = '';
                    if (data.status === 'success' && data.data.length > 0) {
                        data.data.forEach(item => {
                            grid.appendChild(createClubCardElement({
                                color: 'from-blue-500 to-indigo-600',
                                tag: item.Club_type || 'ทั่วไป',
                                icon: 'fa-users',
                                title: item.Name_Club,
                                desc: item.Description,
                                members: item.Member || 'ไม่จำกัด',
                                customImage: item.Club_Image
                            }));
                        });
                    } else {
                        grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400"><p>ยังไม่มีข้อมูลชมรม</p></div>';
                    }
                })
                .catch(() => {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-400"><p>ไม่สามารถโหลดข้อมูลได้</p></div>';
                });
        }

        // -- Event Listeners --
        document.addEventListener('DOMContentLoaded', () => {
            fetch('../../backend/auth/check_auth.php')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        if (data.role === 'admin') document.getElementById('admin-btn')?.classList.remove('hidden');
                        loadClubData();
                    } else {
                        window.location.href = '../auth/login.html';
                    }
                });
        });
    </script>
</body>

</html>
