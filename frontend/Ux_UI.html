<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสมัครเข้าชมรม</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Styling --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            /* พื้นหลังไล่เฉดสีโทนชมรมสมัยใหม่ */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        h2.title {
            color: #333;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 28px;
        }

        /* ส่วนของปุ่มสลับ Login / Register */
        .buttons-container {
            display: flex;
            background: #f0f2f5;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .buttons-container button {
            flex: 1;
            border: none;
            padding: 12px;
            cursor: pointer;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            color: #777;
            transition: all 0.3s ease;
            border-radius: 10px;
        }

        .buttons-container button.active {
            background: #ffffff;
            color: #764ba2;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* การตกแต่งฟอร์ม */
        h3 {
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-size: 15px;
        }

        input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 8px rgba(118, 75, 162, 0.1);
        }

        /* ปุ่มตกลง (Login/Register) */
        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Animation สลับฟอร์ม */
        .form-content {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 class="title">ชมรมของเรา 🌟</h2>
        
        <div class="buttons-container">
            <button id="showLogin" class="active">เข้าสู่ระบบ</button>
            <button id="showRegister">สมัครสมาชิก</button>
        </div>

        <div id="loginForm" class="form-content">
            <h3>ชื่อผู้ใช้งาน</h3>
            <input type="text" placeholder="Username หรือ รหัสนักศึกษา" required/>
            
            <h3>รหัสผ่าน</h3>
            <input type="password" placeholder="Password" required/>
            
            <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
        </div>

        <div id="registerForm" class="form-content" style="display:none;">
            <h3>ชื่อ</h3>
            <input type="text" placeholder="ชื่อจริง" required/>
            
            <h3>นามสกุล</h3>
            <input type="text" placeholder="นามสกุล" required/>
            
            <h3>เบอร์โทรศัพท์</h3>
            <input type="tel" placeholder="08x-xxx-xxxx" required/>
            
            <h3>อีเมล</h3>
            <input type="email" placeholder="example@email.com" required/>
            
            <button type="submit" class="btn-submit">ลงชื่อเข้าชมรม</button>
        </div>
    </div>

    <script>
        // --- JavaScript Logic ---
        const loginBtn = document.getElementById('showLogin');
        const registerBtn = document.getElementById('showRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        // ฟังก์ชันเมื่อคลิกปุ่ม Login
        loginBtn.addEventListener('click', () => {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginBtn.classList.add('active');
            registerBtn.classList.remove('active');
        });

        // ฟังก์ชันเมื่อคลิกปุ่ม Register
        registerBtn.addEventListener('click', () => {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerBtn.classList.add('active');
            loginBtn.classList.remove('active');
        });
    </script>

</body>
</html>
