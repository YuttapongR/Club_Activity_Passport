<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Activity Management System - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
        }

        /* เพิ่ม Animation นุ่มๆ เวลาโหลดหน้า */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-gradient-to-r from-blue-700 to-blue-500 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="main.html" class="flex items-center space-x-3 cursor-pointer select-none">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i class="fas fa-users-cog text-2xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-wide">ClubHub</span>
            </a>
            <div class="space-x-2 sm:space-x-4 flex items-center">
                <a href="main.html"
                    class="px-3 py-2 rounded-lg font-medium hover:bg-white/10 transition duration-200">หน้าผู้ใช้งาน</a>
                <div class="w-px h-6 bg-white/30 hidden sm:block"></div>
                <!-- ปุ่ม Admin เป็นแบบ Active -->
                <a href="admin.html"
                    class="bg-slate-900/40 px-4 py-2 rounded-lg font-medium hover:bg-slate-900/60 transition duration-200 shadow-sm border border-white/10">
                    <i class="fas fa-shield-alt mr-2 sm:hidden lg:inline"></i>โหมด Admin
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10 flex-grow">

        <div id="admin-view" class="fade-in">
            <div
                class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-slate-200 pb-6">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800">จัดการระบบ</h2>
                    <p class="text-slate-500 mt-1">แผงควบคุมสำหรับผู้ดูแลระบบ (Admin Panel)</p>
                </div>
                <button
                    class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-blue-700 active:scale-95 transition duration-200 shadow-sm shadow-blue-200 w-full md:w-auto flex items-center justify-center">
                    <i class="fas fa-plus mr-2"></i> สร้างชมรมใหม่
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full leading-normal">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                <th class="px-6 py-4 text-left font-bold">ID</th>
                                <th class="px-6 py-4 text-left font-bold">ชื่อชมรม</th>
                                <th class="px-6 py-4 text-left font-bold">ประเภท</th>
                                <th class="px-6 py-4 text-left font-bold">จำนวนสมาชิก</th>
                                <th class="px-6 py-4 text-center font-bold text-slate-700">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-sm">
                            <tr class="hover:bg-slate-50 transition duration-150">
                                <td class="px-6 py-4 text-slate-500 font-mono text-xs">CLUB-01</td>
                                <td class="px-6 py-4 font-semibold text-slate-800">Coding & Tech</td>
                                <td class="px-6 py-4">
                                    <span
                                        class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium">วิชาการ</span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center">
                                        <div class="w-full bg-slate-200 rounded-full h-2 mr-3 max-w-[80px]">
                                            <div class="bg-indigo-500 h-2 rounded-full" style="width: 0%"></div>
                                        </div>
                                        <span class="text-slate-600 font-medium">0/50</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-center space-x-2 whitespace-nowrap">
                                    <button
                                        class="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-2 rounded-lg transition"
                                        title="แก้ไข">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button
                                        class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition"
                                        title="ลบ">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </td>
                            </tr>
                            <tr class="hover:bg-slate-50 transition duration-150">
                                <td class="px-6 py-4 text-slate-500 font-mono text-xs">CLUB-02</td>
                                <td class="px-6 py-4 font-semibold text-slate-800">บาสเกตบอล</td>
                                <td class="px-6 py-4">
                                    <span
                                        class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-medium">กีฬา</span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center">
                                        <div class="w-full bg-slate-200 rounded-full h-2 mr-3 max-w-[80px]">
                                            <div class="bg-orange-500 h-2 rounded-full" style="width: 0%"></div>
                                        </div>
                                        <span class="text-slate-600 font-medium">0/30</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-center space-x-2 whitespace-nowrap">
                                    <button
                                        class="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-2 rounded-lg transition"
                                        title="แก้ไข">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button
                                        class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition"
                                        title="ลบ">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="container mx-auto px-6 py-6 text-center text-slate-500 text-sm">
            <p>&copy; 2024 ClubHub Management System. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>
